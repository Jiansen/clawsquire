name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-serve:
    name: "Build serve (${{ matrix.target }})"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: clawsquire-serve
            asset: clawsquire-serve-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: clawsquire-serve
            asset: clawsquire-serve-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: clawsquire-serve
            asset: clawsquire-serve-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: clawsquire-serve
            asset: clawsquire-serve-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: clawsquire-serve.exe
            asset: clawsquire-serve-windows-x86_64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install cross (Linux aarch64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p clawsquire-serve

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }} -p clawsquire-serve

      - name: Rename artifact
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: "Build desktop (${{ matrix.platform }})"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClawSquire ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            ### Desktop App (GUI)
            | System | File |
            |--------|------|
            | macOS Apple Silicon (M1+) | `ClawSquire_*_aarch64.dmg` |
            | macOS Intel | `ClawSquire_*_x64.dmg` |
            | Windows 10+ | `ClawSquire_*_x64_en-US.msi` |
            | Linux (Debian/Ubuntu) | `ClawSquire_*_amd64.deb` |
            | Linux (portable) | `ClawSquire_*_amd64.AppImage` |

            ### Headless Agent (for remote servers, no GUI needed)
            | System | File |
            |--------|------|
            | Linux x86_64 | `clawsquire-serve-linux-x86_64` |
            | Linux ARM64 | `clawsquire-serve-linux-aarch64` |
            | macOS Apple Silicon | `clawsquire-serve-darwin-aarch64` |
            | macOS Intel | `clawsquire-serve-darwin-x86_64` |
            | Windows x86_64 | `clawsquire-serve-windows-x86_64.exe` |

            ### Quick Start (headless agent)
            ```sh
            curl -fsSL "https://github.com/Jiansen/clawsquire/releases/latest/download/clawsquire-serve-linux-x86_64" -o clawsquire-serve
            chmod +x clawsquire-serve
            ./clawsquire-serve --init
            ```

            ---
            [CHANGELOG.md](https://github.com/Jiansen/clawsquire/blob/main/CHANGELOG.md)
          releaseDraft: ${{ contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: false
          args: ${{ matrix.args }}
