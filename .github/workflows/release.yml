name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-serve:
    name: "Build serve (${{ matrix.target }})"
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-22.04
            binary: clawsquire-serve
            asset: clawsquire-serve-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-22.04-arm
            binary: clawsquire-serve
            asset: clawsquire-serve-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: clawsquire-serve
            asset: clawsquire-serve-darwin-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: clawsquire-serve
            asset: clawsquire-serve-darwin-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: clawsquire-serve.exe
            asset: clawsquire-serve-windows-x86_64.exe
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p clawsquire-serve

      - name: Rename artifact
        shell: bash
        run: |
          cp "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.asset }}"

      - name: Upload to Release
        shell: bash
        run: |
          # Ensure release exists (create as draft if needed), then upload asset.
          # gh release upload handles concurrent uploads gracefully with --clobber.
          TAG="${{ github.ref_name }}"
          ASSET="${{ matrix.asset }}"
          IS_PRE=$(echo "$TAG" | grep -q '-' && echo true || echo false)
          # Create release only if it doesn't exist yet; ignore error if already present.
          # Note: never use --draft here — draft releases are not downloadable without auth,
          # which would break the build-desktop sidecar download step.
          gh release create "$TAG" \
            --prerelease="$IS_PRE" \
            --title "$TAG" \
            --notes "Release $TAG" \
            2>/dev/null || true
          # Upload (overwrite if exists)
          gh release upload "$TAG" "$ASSET" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-desktop:
    name: "Build desktop (${{ matrix.platform }})"
    needs: [build-serve]
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            serve_asset: clawsquire-serve-darwin-aarch64
            sidecar_triple: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            serve_asset: clawsquire-serve-darwin-x86_64
            sidecar_triple: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
            serve_asset: clawsquire-serve-linux-x86_64
            sidecar_triple: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: ''
            serve_asset: clawsquire-serve-windows-x86_64.exe
            sidecar_triple: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Download clawsquire-serve sidecar (Unix)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          ASSET="${{ matrix.serve_asset }}"
          TRIPLE="${{ matrix.sidecar_triple }}"
          EXT=""
          URL="https://github.com/Jiansen/clawsquire/releases/download/${{ github.ref_name }}/${ASSET}"
          curl -fsSL "$URL" -o "src-tauri/binaries/clawsquire-serve-${TRIPLE}${EXT}"
          chmod +x "src-tauri/binaries/clawsquire-serve-${TRIPLE}"

      - name: Download clawsquire-serve sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $asset = "${{ matrix.serve_asset }}"
          $triple = "${{ matrix.sidecar_triple }}"
          $url = "https://github.com/Jiansen/clawsquire/releases/download/${{ github.ref_name }}/$asset"
          Invoke-WebRequest -Uri $url -OutFile "src-tauri/binaries/clawsquire-serve-${triple}.exe"

      - name: Import Apple certificate (macOS)
        if: matrix.platform == 'macos-latest'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo -n "$APPLE_CERTIFICATE" | base64 --decode -o $CERTIFICATE_PATH
          security create-keychain -p "actions" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "actions" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "actions" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      - name: Build & publish (attempt 1)
        id: tauri1
        continue-on-error: true
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClawSquire ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            ### Desktop App (GUI)
            | System | File |
            |--------|------|
            | macOS Apple Silicon (M1+) | `ClawSquire_*_aarch64.dmg` |
            | macOS Intel | `ClawSquire_*_x64.dmg` |
            | Windows 10+ | `ClawSquire_*_x64_en-US.msi` |
            | Linux (Debian/Ubuntu) | `ClawSquire_*_amd64.deb` |
            | Linux (portable) | `ClawSquire_*_amd64.AppImage` |

            ### Headless Agent (for remote servers, no GUI needed)
            | System | File |
            |--------|------|
            | Linux x86_64 | `clawsquire-serve-linux-x86_64` |
            | Linux ARM64 | `clawsquire-serve-linux-aarch64` |
            | macOS Apple Silicon | `clawsquire-serve-darwin-aarch64` |
            | macOS Intel | `clawsquire-serve-darwin-x86_64` |
            | Windows x86_64 | `clawsquire-serve-windows-x86_64.exe` |

            ### Quick Start (headless agent)
            ```sh
            curl -fsSL "https://github.com/Jiansen/clawsquire/releases/latest/download/clawsquire-serve-linux-x86_64" -o clawsquire-serve
            chmod +x clawsquire-serve
            ./clawsquire-serve --init
            ```

            ---
            [CHANGELOG.md](https://github.com/Jiansen/clawsquire/blob/main/CHANGELOG.md)
          releaseDraft: ${{ contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: false
          args: ${{ matrix.args }}

      - name: Wait before retry
        if: steps.tauri1.outcome == 'failure'
        run: |
          echo "::warning::Attempt 1 failed (likely notarization timeout). Retrying in 60s..."
          sleep 60

      - name: Build & publish (retry)
        if: steps.tauri1.outcome == 'failure'
        uses: tauri-apps/tauri-action@v0
        timeout-minutes: 30
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClawSquire ${{ github.ref_name }}'
          releaseBody: |
            ## Downloads

            ### Desktop App (GUI)
            | System | File |
            |--------|------|
            | macOS Apple Silicon (M1+) | `ClawSquire_*_aarch64.dmg` |
            | macOS Intel | `ClawSquire_*_x64.dmg` |
            | Windows 10+ | `ClawSquire_*_x64_en-US.msi` |
            | Linux (Debian/Ubuntu) | `ClawSquire_*_amd64.deb` |
            | Linux (portable) | `ClawSquire_*_amd64.AppImage` |

            ### Headless Agent (for remote servers, no GUI needed)
            | System | File |
            |--------|------|
            | Linux x86_64 | `clawsquire-serve-linux-x86_64` |
            | Linux ARM64 | `clawsquire-serve-linux-aarch64` |
            | macOS Apple Silicon | `clawsquire-serve-darwin-aarch64` |
            | macOS Intel | `clawsquire-serve-darwin-x86_64` |
            | Windows x86_64 | `clawsquire-serve-windows-x86_64.exe` |

            ### Quick Start (headless agent)
            ```sh
            curl -fsSL "https://github.com/Jiansen/clawsquire/releases/latest/download/clawsquire-serve-linux-x86_64" -o clawsquire-serve
            chmod +x clawsquire-serve
            ./clawsquire-serve --init
            ```

            ---
            [CHANGELOG.md](https://github.com/Jiansen/clawsquire/blob/main/CHANGELOG.md)
          releaseDraft: ${{ contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          updaterJsonPreferNsis: true
          updaterJsonKeepUniversal: false
          args: ${{ matrix.args }}
