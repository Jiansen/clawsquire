name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClawSquire ${{ github.ref_name }}'
          releaseBody: |
            ## Quick Download Guide

            Pick **one** file based on your system:

            - **Mac Apple Silicon (M1/M2/M3)** → `ClawSquire_*_aarch64.dmg`
            - **Mac Intel** → `ClawSquire_*_x64.dmg`
            - **Windows 10+** → `ClawSquire_*_x64_en-US.msi` (recommended)
            - **Linux Debian/Ubuntu** → `ClawSquire_*_amd64.deb`
            - **Linux (portable)** → `ClawSquire_*_amd64.AppImage`

            If you are not sure on macOS:
            - Click Apple menu → **About This Mac**
            - If chip says **Apple M1/M2/M3**, choose `aarch64.dmg`
            - If chip says **Intel**, choose `x64.dmg`

            ---
            Full release notes: [CHANGELOG.md](https://github.com/Jiansen/clawsquire/blob/main/CHANGELOG.md)
          releaseDraft: ${{ contains(github.ref_name, '-') }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
