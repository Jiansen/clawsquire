name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: "Test (${{ matrix.platform }})"
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJSON(github.event_name == 'pull_request' && '["macos-latest","ubuntu-22.04","windows-latest"]' || '["ubuntu-22.04"]') }}
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build sidecar binary
        run: cargo build -p clawsquire-serve

      - name: Place sidecar for Tauri build
        shell: bash
        run: |
          TRIPLE=$(rustc --print host-tuple)
          EXT=""
          if [[ "$TRIPLE" == *windows* ]]; then EXT=".exe"; fi
          mkdir -p src-tauri/binaries
          cp "target/debug/clawsquire-serve${EXT}" "src-tauri/binaries/clawsquire-serve-${TRIPLE}${EXT}"
          ls -la src-tauri/binaries/

      - name: Cargo check (full workspace)
        run: cargo check

      - name: Core unit tests
        run: cargo test -p clawsquire-core

      - name: Serve unit tests
        run: cargo test -p clawsquire-serve --bin clawsquire-serve

      - name: Protocol E2E tests
        run: cargo test -p clawsquire-serve --test e2e_protocol
