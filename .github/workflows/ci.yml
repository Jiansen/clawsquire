name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - name: TypeScript + Vite build
        run: pnpm build

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cargo check (Tauri backend)
        working-directory: src-tauri
        run: cargo check

  test-node-detection:
    name: "Test: Node.js detection & install (${{ matrix.platform }})"
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      # Phase 1: Test detection WITH Node.js already on PATH (CI default)
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: "Phase 1: Detect Node.js (pre-installed)"
        working-directory: src-tauri
        run: cargo test --lib -- --test-threads=1
        env:
          RUST_LOG: debug

      # Phase 2: Full install_node integration test (downloads ~30MB)
      - name: "Phase 2: install_node integration test"
        working-directory: src-tauri
        run: cargo test node_install::tests::install_node_downloads_and_works -- --test-threads=1 --ignored
        timeout-minutes: 5

  e2e:
    name: "E2E: Dashboard & Node detection (${{ matrix.platform }})"
    strategy:
      fail-fast: false
      matrix:
        platform: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system deps + WebKitWebDriver
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
            webkit2gtk-driver xvfb

      - name: Install tauri-driver
        run: cargo install tauri-driver --locked

      - name: Install Edge WebDriver (Windows)
        if: matrix.platform == 'windows-latest'
        run: |
          $edgeVersion = (Get-Item "C:\Program Files (x86)\Microsoft\Edge\Application\msedge.exe").VersionInfo.FileVersion
          Write-Host "Edge version: $edgeVersion"
          $majorVersion = $edgeVersion.Split('.')[0]
          # Try the standard MSFT CDN; fall back to npm msedgedriver package
          try {
            $url = "https://msedgedriver.azureedge.net/$edgeVersion/edgedriver_win64.zip"
            Invoke-WebRequest -Uri $url -OutFile edgedriver.zip -TimeoutSec 30
            Expand-Archive -Path edgedriver.zip -DestinationPath "$env:USERPROFILE\.cargo\bin" -Force
            Remove-Item edgedriver.zip
          } catch {
            Write-Host "CDN download failed, trying npm msedgedriver package..."
            npm install -g msedgedriver@$majorVersion
            $npmBin = (npm root -g) -replace 'node_modules$', 'node_modules\.bin'
            Copy-Item "$npmBin\msedgedriver.cmd" "$env:USERPROFILE\.cargo\bin\" -ErrorAction SilentlyContinue
            $driverPath = (npm root -g) + "\msedgedriver\lib\msedgedriver.exe"
            if (Test-Path $driverPath) {
              Copy-Item $driverPath "$env:USERPROFILE\.cargo\bin\msedgedriver.exe"
            }
          }
        shell: pwsh

      - name: Install E2E deps
        working-directory: e2e-tests
        run: npm install

      - name: Build Tauri debug binary
        run: pnpm tauri build --debug --no-bundle

      - name: Run E2E tests (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        working-directory: e2e-tests
        run: xvfb-run npm test -- --spec test/specs/dashboard.e2e.js
        timeout-minutes: 10

      - name: Run E2E tests (Windows)
        if: matrix.platform == 'windows-latest'
        working-directory: e2e-tests
        run: npm test -- --spec test/specs/dashboard.e2e.js
        timeout-minutes: 10
