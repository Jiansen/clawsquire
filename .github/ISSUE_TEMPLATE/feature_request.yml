name: Feature Request
description: Suggest a feature for ClawSquire
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement!
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Or what would it improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe how you'd like this to work.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or features you've considered.
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Installation / Setup
        - Configuration
        - Health Check
        - Backups
        - Internationalization (i18n)
        - UI / UX
        - Other
    validations:
      required: true
